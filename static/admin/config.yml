backend:
  name: git-gateway
  branch: main

local_backend: true
publish_mode: editorial_workflow

site_url: /
display_url: /
logo_url: /icons/logo.svg

media_folder: static/uploads
public_folder: /uploads

collections:
  - name: authors
    label: Authors
    label_singular: Author
    folder: content/authors
    create: true
    extension: md
    format: toml-frontmatter
    path: "{{slug}}/_index"
    preview_path: "/authors/{{slug}}/"
    summary: "{{title}}"
    fields:
      - { label: Name, name: title, widget: string }
      - { label: Role, name: role, widget: string }
      - { label: Photo, name: photo, widget: image, required: false }
      - { label: Email, name: email, widget: string, required: false }
      - { label: X Handle, name: x, widget: string, required: false, hint: Enter the handle without @. }
      - { label: Bio, name: body, widget: markdown, required: false }

  - name: news_articles
    label: News Articles
    label_singular: News Article
    folder: content/news
    create: true
    filter:
      field: cms
      value: article
    extension: md
    format: toml-frontmatter
    path: "{{subcategory}}/{{slug}}/index"
    preview_path: "/news/{{subcategory}}/{{slug}}/"
    summary: "{{title}}"
    sortable_fields:
      - date
      - title
      - author.title
    view_groups:
      - label: Category
        field: categories
      - label: Subcategory
        field: subcategory
    fields:
      - label: Title
        name: title
        widget: string
      - label: CMS Type
        name: cms
        widget: hidden
        default: article
      - label: Publish Date
        name: date
        widget: datetime
      - label: Draft
        name: draft
        widget: boolean
        default: false
      - label: Summary
        name: summary
        widget: text
      - label: Dateline
        name: dateline
        widget: string
        required: false
      - label: Category
        name: categories
        widget: select
        multiple: true
        min: 1
        default:
          - News
        options:
          - News
        disabled: true
      - label: Subcategory
        name: subcategory
        widget: select
        default: national
        options:
          - { label: National, value: national }
          - { label: Regional, value: regional }
          - { label: Politics, value: politics }
          - { label: Crime, value: crime }
          - { label: Environment, value: environment }
      - label: Author
        name: authors
        widget: relation
        collection: authors
        search_fields:
          - title
          - role
        value_field: title
        display_fields:
          - title
          - role
        multiple: true
        min: 1
        max: 1
      - label: Body
        name: body
        widget: markdown

